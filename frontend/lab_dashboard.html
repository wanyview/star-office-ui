<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAI 知识胶囊实验室</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'SF Mono', 'Monaco', monospace;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            min-height: 100vh;
            color: #e0e0e0;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        
        /* Header */
        .header {
            text-align: center;
            padding: 40px 0;
            border-bottom: 1px solid #333;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 2.5em;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .header .subtitle { color: #888; font-size: 0.9em; }
        
        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            transition: all 0.3s ease;
        }
        .stat-card:hover {
            transform: translateY(-5px);
            border-color: #00d4ff;
            box-shadow: 0 10px 40px rgba(0,212,255,0.1);
        }
        .stat-card .icon { font-size: 2.5em; margin-bottom: 10px; }
        .stat-card .value {
            font-size: 2.2em;
            font-weight: bold;
            color: #00d4ff;
        }
        .stat-card .label { color: #888; margin-top: 5px; }
        
        /* Section */
        .section { margin-bottom: 40px; }
        .section-title {
            font-size: 1.3em;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #333;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        /* Capsule List */
        .capsule-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
        }
        .capsule-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid #2a2a3a;
            border-radius: 8px;
            padding: 16px;
            transition: all 0.2s;
        }
        .capsule-card:hover {
            border-color: #7b2cbf;
            background: rgba(123,44,191,0.1);
        }
        .capsule-card .title {
            font-weight: bold;
            color: #fff;
            margin-bottom: 8px;
        }
        .capsule-card .meta {
            display: flex;
            gap: 15px;
            font-size: 0.85em;
            color: #888;
        }
        .capsule-card .score {
            color: #00ff88;
            font-weight: bold;
        }
        .capsule-card .tags { margin-top: 8px; }
        .capsule-card .tag {
            display: inline-block;
            background: rgba(0,212,255,0.2);
            color: #00d4ff;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75em;
            margin-right: 5px;
        }
        
        /* Labs Section */
        .labs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        .lab-card {
            background: linear-gradient(135deg, rgba(123,44,191,0.2), rgba(0,212,255,0.1));
            border: 1px solid #7b2cbf;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        .lab-card .name { font-weight: bold; margin-bottom: 5px; }
        .lab-card .status { 
            font-size: 0.8em;
            color: #00ff88;
        }
        
        /* Activity */
        .activity-list { list-style: none; }
        .activity-item {
            padding: 12px;
            border-bottom: 1px solid #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .activity-item .time { color: #666; font-size: 0.85em; }
        
        /* Footer */
        .footer {
            text-align: center;
            padding: 20px;
            color: #555;
            font-size: 0.8em;
            border-top: 1px solid #222;
            margin-top: 40px;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .live { animation: pulse 2s infinite; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🧪 KAI 知识胶囊实验室</h1>
            <div class="subtitle">KaiDison Digital Lab | <span class="live">● LIVE</span></div>
        </div>
        
        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="icon">💊</div>
                <div class="value" id="total-capsules">-</div>
                <div class="label">知识胶囊总数</div>
            </div>
            <div class="stat-card">
                <div class="icon">⭐</div>
                <div class="value" id="avg-score">-</div>
                <div class="label">平均 DATM 评分</div>
            </div>
            <div class="stat-card">
                <div class="icon">🔥</div>
                <div class="value" id="high-score">-</div>
                <div class="label">最高 DATM 评分</div>
            </div>
            <div class="stat-card">
                <div class="icon">⚡</div>
                <div class="value" id="collision-count">-</div>
                <div class="label">碰撞实验次数</div>
            </div>
        </div>
        
        <!-- Labs Status -->
        <div class="section">
            <div class="section-title">🔬 实验室状态</div>
            <div class="labs-grid">
                <div class="lab-card">
                    <div class="name">🏢 Star Office</div>
                    <div class="status">● 在线</div>
                </div>
                <div class="lab-card">
                    <div class="name">💊 Capsule V2</div>
                    <div class="status">● 在线</div>
                </div>
                <div class="lab-card">
                    <div class="name">🧠 KaiDison</div>
                    <div class="status">● 在线</div>
                </div>
                <div class="lab-card">
                    <div class="name">🌐 Gateway</div>
                    <div class="status">● 在线</div>
                </div>
            </div>
        </div>
        
        <!-- Top Capsules -->
        <div class="section">
            <div class="section-title">🌟 高分知识胶囊 TOP 10</div>
            <div class="capsule-grid" id="capsule-list">
                <div style="color:#666;text-align:center;padding:40px;">加载中...</div>
            </div>
        </div>
        
        <!-- Footer -->
        <div class="footer">
            KAI 知识胶囊实验室 v2.0 | 最后更新: <span id="last-update">-</span>
        </div>
    </div>
    
    <script>
        async function loadData() {
            try {
                const res = await fetch('/api/capsules');
                const data = await res.json();
                const capsules = data.capsules || [];
                
                // Stats
                const scores = capsules.filter(c => c.datm_score > 0).map(c => c.datm_score);
                const avg = scores.length ? (scores.reduce((a,b)=>a+b,0)/scores.length).toFixed(1) : 0;
                const max = scores.length ? Math.max(...scores).toFixed(1) : 0;
                
                document.getElementById('total-capsules').textContent = capsules.length;
                document.getElementById('avg-score').textContent = avg;
                document.getElementById('high-score').textContent = max;
                document.getElementById('collision-count').textContent = '1';
                
                // Sort by score
                const sorted = [...capsules].sort((a,b) => b.datm_score - a.datm_score).slice(0,10);
                
                // Render
                document.getElementById('capsule-list').innerHTML = sorted.map(c => `
                    <div class="capsule-card">
                        <div class="title">${c.title}</div>
                        <div class="meta">
                            <span class="score">DATM: ${c.datm_score.toFixed(1)}</span>
                            <span>${c.domain || 'general'}</span>
                        </div>
                        <div class="tags">
                            ${(c.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('')}
                        </div>
                    </div>
                `).join('');
                
                document.getElementById('last-update').textContent = new Date().toLocaleString('zh-CN');
            } catch(e) {
                console.error(e);
                document.getElementById('capsule-list').innerHTML = '<div style="color:#ff4444;padding:20px;">加载失败</div>';
            }
        }
        
        loadData();
        setInterval(loadData, 30000); // Refresh every 30s
    </script>
</body>
</html>
